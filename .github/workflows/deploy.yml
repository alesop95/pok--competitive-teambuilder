# Pubblicazione della web app (SPA statica con motore client-side, ADR-009/ADR-011) su GitHub Pages.
# Ad ogni push su main: installa le dipendenze, builda con Vite e pubblica web/dist su Pages.
# Prerequisito una tantum: in Settings > Pages del repo, impostare Source = "GitHub Actions".
name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permessi minimi richiesti dal deploy ufficiale di Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Una pubblicazione alla volta; annulla quelle in coda superate
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:web
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
